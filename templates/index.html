<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">

    <title>Mapa SENAI Pernambuco</title>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f5f5f5;
        }

        .titulo{
            text-align:center;
            padding:15px;
            background:#003366;
            color:white;
        }

        .info{
            text-align:center;
            padding:10px;
            background:white;
        }

        .mapa{
            width:100%;
            height:90vh;
        }

    </style>

</head>

<body>

    <div class="titulo">
        <h1>Mapa SENAI Pernambuco</h1>
    </div>

    <div class="info">
        <h3>Total de Empresas: {{ total_empresas }}</h3>
    </div>

    <div class="mapa">
        {{ mapa|safe }}
    </div>

</body>

</html>
